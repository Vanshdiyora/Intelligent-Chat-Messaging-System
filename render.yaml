services:
  - type: web
    name: intelligent-chat-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: MODEL_DIR
        value: /opt/render/project/src/ai/saved_models
      - key: PYTHON_VERSION
        value: 3.11.6
